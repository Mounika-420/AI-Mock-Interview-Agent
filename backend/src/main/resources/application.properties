spring.application.name=ai-interview-backend
server.port=8080

# --- Database (H2 file-based, good for local dev / demo) ---
# Swap these 4 lines for MySQL/Postgres in production, e.g.:
# spring.datasource.url=jdbc:mysql://localhost:3306/ai_interview_db
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:h2:file:./data/ai_interview_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional: browse the DB at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Gemini API ---
# Set the real key via environment variable: export GEMINI_API_KEY=your_key_here
gemini.api.key=${GEMINI_API_KEY:your-gemini-api-key-here}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
