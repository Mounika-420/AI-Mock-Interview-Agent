<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview | AI Mock Interview Agent</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/interview.css">
</head>
<body>
  <header class="navbar">
    <span class="brand">AI Mock Interview Agent</span>
    <a class="btn btn-secondary" href="dashboard.html">Back to Dashboard</a>
  </header>

  <main class="interview-container">
    <h2 id="interview-title">Interview</h2>
    <div id="question-progress" class="question-progress"></div>

    <div id="question-card" class="question-card">
      <p id="question-text">Loading question...</p>
      <textarea id="answer-box" rows="6" placeholder="Type your answer here..."></textarea>
      <div class="question-actions">
        <button id="prev-btn" class="btn btn-secondary">Previous</button>
        <button id="next-btn" class="btn btn-primary">Next</button>
        <button id="submit-btn" class="btn btn-primary hidden">Submit Interview</button>
      </div>
    </div>

    <p class="error-msg" id="interview-error"></p>
  </main>

  <script src="js/interview.js"></script>
</body>
</html>
