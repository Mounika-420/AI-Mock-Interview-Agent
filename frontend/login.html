<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AI Mock Interview Agent</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="auth-container">
    <div class="tabs">
      <button id="tab-login" class="tab active">Login</button>
      <button id="tab-register" class="tab">Sign Up</button>
    </div>

    <form id="login-form" class="auth-form">
      <h2>Welcome back</h2>
      <input type="text" id="login-username" placeholder="Username" required>
      <input type="password" id="login-password" placeholder="Password" required>
      <button type="submit" class="btn btn-primary">Login</button>
      <p class="error-msg" id="login-error"></p>
    </form>

    <form id="register-form" class="auth-form hidden">
      <h2>Create an account</h2>
      <input type="text" id="register-fullname" placeholder="Full Name">
      <input type="email" id="register-email" placeholder="Email" required>
      <input type="text" id="register-username" placeholder="Username" required>
      <input type="password" id="register-password" placeholder="Password" required>
      <button type="submit" class="btn btn-primary">Sign Up</button>
      <p class="error-msg" id="register-error"></p>
    </form>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
